<div class="container">
  <div class="header">
    <h1>Users</h1>
    <button mat-raised-button color="primary" (click)="onCreateUser()">
      <mat-icon>add</mat-icon>
      New User
    </button>
  </div>

  @if (loading()) {
    <div class="loading">
      <mat-spinner></mat-spinner>
    </div>
  } @else {
    <div class="table-container">
      <table mat-table [dataSource]="users()" class="mat-elevation-z2">
        <ng-container matColumnDef="username">
          <th mat-header-cell *matHeaderCellDef>Username</th>
          <td mat-cell *matCellDef="let user" data-label="Username">{{ user.username }}</td>
        </ng-container>

        <ng-container matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef>Name</th>
          <td mat-cell *matCellDef="let user" data-label="Name">
            {{ user.name }} {{ user.surnames }}
          </td>
        </ng-container>

        <ng-container matColumnDef="email">
          <th mat-header-cell *matHeaderCellDef>Email</th>
          <td mat-cell *matCellDef="let user" data-label="Email">{{ user.email }}</td>
        </ng-container>

        <ng-container matColumnDef="age">
          <th mat-header-cell *matHeaderCellDef>Age</th>
          <td mat-cell *matCellDef="let user" data-label="Age">{{ user.age }}</td>
        </ng-container>

        <ng-container matColumnDef="active">
          <th mat-header-cell *matHeaderCellDef>Status</th>
          <td mat-cell *matCellDef="let user" data-label="Status">
            <mat-chip [highlighted]="user.active">
              {{ user.active ? 'Active' : 'Inactive' }}
            </mat-chip>
          </td>
        </ng-container>

        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef>Actions</th>
          <td mat-cell *matCellDef="let user" data-label="Actions">
            <div class="actions-group">
              <button mat-icon-button (click)="onViewUser(user)" matTooltip="View">
                <mat-icon>visibility</mat-icon>
              </button>
              <button mat-icon-button (click)="onEditUser(user)" matTooltip="Edit">
                <mat-icon>edit</mat-icon>
              </button>
              <button mat-icon-button color="warn" (click)="onDeleteUser(user)" matTooltip="Delete">
                <mat-icon>delete</mat-icon>
              </button>
            </div>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
      </table>
    </div>

    @if (users().length === 0) {
      <div class="empty-state">
        <mat-icon>people_outline</mat-icon>
        <p>No users found</p>
        <button mat-raised-button color="primary" (click)="onCreateUser()">
          Create First User
        </button>
      </div>
    }
  }
</div>
